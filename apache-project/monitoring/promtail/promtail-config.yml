server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: apache_access
    static_configs:
      - targets: [localhost]
        labels:
          job: apache_access
          app: apache-project
          __path__: /var/log/apache2/access.log

  - job_name: apache_error
    static_configs:
      - targets: [localhost]
        labels:
          job: apache_error
          app: apache-project
          __path__: /var/log/apache2/error.log
