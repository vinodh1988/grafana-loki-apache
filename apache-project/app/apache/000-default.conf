<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        AllowOverride All
        Require all granted
    </Directory>

    # Expose mod_status for apache_exporter.
    <Location /server-status>
        SetHandler server-status
        Require all granted
    </Location>

    # Access log includes request duration in microseconds (%D).
    LogFormat "%h %l %u [%t] \"%m %U%q %H\" %>s %b %D \"%{Referer}i\" \"%{User-Agent}i\"" prometheus
    CustomLog /var/log/apache-real/access.log prometheus
    ErrorLog /var/log/apache-real/error.log

    ErrorLogFormat "[%t] [%l] [pid %P] [client %a] %M"
</VirtualHost>
